name: location_app
description: Descubra pousadas, casas e chalés em Ubatuba.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Maps
  google_maps_flutter: ^2.9.0

  # Images
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Calendar / dates
  table_calendar: ^3.1.2

  # Payment (MercadoPago via REST + PIX QR code)
  http: ^1.2.0
  qr_flutter: ^4.1.0
  webview_flutter: ^4.10.0

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  gap: ^3.0.1

  # Utils
  intl: ^0.19.0
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/
    - assets/images/
